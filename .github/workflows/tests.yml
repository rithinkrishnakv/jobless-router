name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  offline-demo-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python tests/test_demo.py
      - run: python tests/test_review_fixes.py
      - run: python tests/test_live_findings.py
