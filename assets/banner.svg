<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
<style>
  @keyframes pulse   { 0%,100% { opacity:1 }   50% { opacity:.25 } }
  @keyframes blink   { 0%,55%  { opacity:1 }   56%,100% { opacity:0 } }
  @keyframes shimmer { 0%,100% { stop-color:#4be3ab } 50% { stop-color:#0c3a2c } }
  @keyframes caution { 0%,100% { opacity:1 }   50% { opacity:.45 } }
  .pulseSlow  { animation: pulse 2.2s ease-in-out infinite; }
  .pulseFast  { animation: pulse 0.9s ease-in-out infinite; }
  .cursor     { animation: blink 1s steps(1) infinite; }
  .midStop    { animation: shimmer 2.6s ease-in-out infinite; }
  .caution    { animation: caution 1.8s ease-in-out infinite; }
  #scanbar    { animation: sweep 3.6s linear infinite; }
  @keyframes sweep {
    0%   { transform: translateX(0); }
    100% { transform: translateX(1200px); }
  }
</style>

<defs>
  <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#1f8f68"/>
    <stop offset="50%" class="midStop" stop-color="#4be3ab"/>
    <stop offset="100%" stop-color="#22d3ee"/>
  </linearGradient>
  <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#2bdca0" stop-opacity="0"/>
    <stop offset="50%" stop-color="#2bdca0" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#2bdca0" stop-opacity="0"/>
  </linearGradient>
  <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
    <path d="M0 0 H28 M0 0 V28" stroke="#11221d" stroke-width="1"/>
  </pattern>
  <clipPath id="frame">
    <rect x="0" y="0" width="1200" height="320" rx="10"/>
  </clipPath>
</defs>

<g clip-path="url(#frame)">
  <rect x="0" y="0" width="1200" height="320" fill="#070b10"/>
  <rect x="0" y="0" width="1200" height="320" fill="url(#grid)" opacity="0.55"/>

  <!-- live scan sweep along the top edge -->
  <rect id="scanbar" x="-220" y="0" width="220" height="3" fill="url(#scanGrad)"/>

  <rect x="0.5" y="0.5" width="1199" height="319" rx="10" fill="none" stroke="#1c2b27" stroke-width="1.5"/>
  <line x1="392" y1="34" x2="392" y2="286" stroke="#16201d" stroke-width="1.5"/>

  <!-- ============ LEFT: route-topology diagram ============ -->
  <text x="36" y="40" font-family="monospace" font-size="11" fill="#3f5750" letter-spacing="2">AS-PATH TRACE</text>

  <!-- legit path: origin -> transit -> verified destination -->
  <path id="goodPath" d="M64,176 C128,176 132,176 178,176 C246,176 268,128 322,104"
        fill="none" stroke="#1f8f68" stroke-width="2" opacity="0.55"/>
  <!-- leaked fork: transit -> shield (blocked) -->
  <path id="badPath" d="M178,176 C236,196 272,222 322,238"
        fill="none" stroke="#7a3030" stroke-width="2" stroke-dasharray="5 5" opacity="0.7"/>

  <!-- origin node -->
  <circle cx="64" cy="176" r="9" fill="#0c1410" stroke="#2bdca0" stroke-width="2"/>
  <text x="64" y="204" font-family="monospace" font-size="9" fill="#4d655e" text-anchor="middle">ORIGIN</text>

  <!-- transit node ("complicit" upstream) -->
  <circle cx="178" cy="176" r="10" fill="#0c1410" stroke="#2bdca0" stroke-width="2" class="pulseSlow"/>
  <text x="178" y="204" font-family="monospace" font-size="9" fill="#4d655e" text-anchor="middle">TRANSIT</text>

  <!-- verified destination node -->
  <g transform="translate(322,104)">
    <circle r="11" fill="#0c1410" stroke="#2bdca0" stroke-width="2"/>
    <path d="M-5,0 L-1,5 L6,-6" fill="none" stroke="#2bdca0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="322" y="132" font-family="monospace" font-size="9" fill="#4d655e" text-anchor="middle">VERIFIED</text>

  <!-- shield / blocked node -->
  <g transform="translate(322,238)">
    <path d="M0,-14 L12,-9 L12,4 C12,16 0,24 0,24 C0,24 -12,16 -12,4 L-12,-9 Z"
          fill="#0c1410" stroke="#ff6b5e" stroke-width="2"/>
    <path d="M-5,4 L-1,9 L6,-4" fill="none" stroke="#3a1715" stroke-width="0" />
    <circle r="20" fill="none" stroke="#ff6b5e" stroke-width="2" opacity="0">
      <animate attributeName="opacity" values="0;0;0.9;0" keyTimes="0;0.78;0.88;1" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="r" values="6;6;22;26" keyTimes="0;0.78;0.88;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="322" y="270" font-family="monospace" font-size="9" fill="#7a4d47" text-anchor="middle">BLOCKED</text>

  <!-- flowing legit packets -->
  <circle r="3.6" fill="#34d399">
    <animateMotion dur="3.4s" repeatCount="indefinite" begin="0s" path="M64,176 C128,176 132,176 178,176 C246,176 268,128 322,104"/>
  </circle>
  <circle r="3.6" fill="#34d399">
    <animateMotion dur="3.4s" repeatCount="indefinite" begin="-1.13s" path="M64,176 C128,176 132,176 178,176 C246,176 268,128 322,104"/>
  </circle>
  <circle r="3.6" fill="#34d399">
    <animateMotion dur="3.4s" repeatCount="indefinite" begin="-2.26s" path="M64,176 C128,176 132,176 178,176 C246,176 268,128 322,104"/>
  </circle>

  <!-- forked hijack packet, fades out as it nears the shield -->
  <circle r="3.6" fill="#ff6b5e">
    <animateMotion dur="2.6s" repeatCount="indefinite" begin="0s" path="M178,176 C236,196 272,222 322,238"/>
    <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.78;0.9" dur="2.6s" repeatCount="indefinite"/>
  </circle>

  <text x="36" y="278" font-family="monospace" font-size="9" fill="#2bdca0">&#9679; legit</text>
  <text x="100" y="278" font-family="monospace" font-size="9" fill="#ff6b5e">&#9679; hijack</text>

  <!-- ============ RIGHT: identity + status ============ -->
  <text x="420" y="142" font-family="'Courier New', monospace" font-size="50" font-weight="bold"
        fill="url(#titleGrad)" letter-spacing="1">JOBLESS-ROUTER</text>

  <text x="420" y="174" font-family="monospace" font-size="15" fill="#7fe6c4" letter-spacing="2">
    BGP ZERO-TRUST THREAT-INTEL ENGINE &#183; ASYNCIO
  </text>

  <text x="420" y="202" font-family="monospace" font-size="13" fill="#8d9994" font-style="italic">
    Reincarnated in a Tier-1 Scrubbing Center to Master BGP Flowspec<tspan class="cursor">_</tspan>
  </text>

  <line x1="420" y1="222" x2="1164" y2="222" stroke="#16201d" stroke-width="1.5"/>

  <!-- live indicator -->
  <circle cx="1150" cy="40" r="5" fill="#ff5f56" class="pulseFast"/>
  <text x="1150" y="60" font-family="monospace" font-size="10" fill="#5b6b66" text-anchor="middle" letter-spacing="1">LIVE</text>

  <!-- status row -->
  <circle cx="424" cy="246" r="3" fill="#2bdca0" class="pulseSlow"/>
  <text x="436" y="250" font-family="monospace" font-size="11" fill="#2bdca0">WATCHING</text>

  <text x="540" y="250" font-family="monospace" font-size="11" fill="#5b6b66">MIT LICENSE</text>
  <text x="660" y="250" font-family="monospace" font-size="11" fill="#5b6b66">PYTHON 3.9+</text>
  <text x="780" y="250" font-family="monospace" font-size="11" fill="#5b6b66">ASYNCIO &#183; ANY OS</text>
  <text x="940" y="250" font-family="monospace" font-size="11" fill="#ff9f5a" class="caution">ADVISORY ONLY</text>

  <text x="420" y="272" font-family="monospace" font-size="10" fill="#3f5750">v1.0 &#183; built by rithinkrishnakv</text>
</g>
</svg>
